<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mise à jour candidature</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f9;
            line-height: 1.5;
            color: #1e293b;
            margin: 0;
            padding: 0;
        }
        .container { max-width: 560px; margin: 0 auto; padding: 32px 20px; }
        .card { background: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        .header { padding: 32px 24px; text-align: center; background-color: #3b82f6; }
        .logo { display: inline-block; max-width: 180px; max-height: 60px; margin-bottom: 16px; }
        .header h1 { color: white; font-size: 24px; font-weight: 600; margin: 0; }
        .divider { height: 4px; background-color: #3b82f6; width: 60px; margin: 0 auto 24px; border-radius: 2px; }
        .content { padding: 32px 28px; background: white; }
        .btn { display: inline-block; background-color: #3b82f6; color: white; padding: 12px 28px; text-decoration: none; border-radius: 50px; font-weight: 500; font-size: 14px; }
        .info-card { background: #f0f9ff; border-radius: 16px; padding: 20px; margin: 24px 0; border-left: 4px solid #3b82f6; }
        .footer { background: #f8fafc; padding: 24px 28px; text-align: center; border-top: 1px solid #e2e8f0; }
        .footer-text { color: #64748b; font-size: 12px; margin: 0 0 8px 0; }
        .footer-link { color: #3b82f6; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header" th:style="'background: ' + ${brand.couleurPrimaire} + ';'">
                <img th:if="${brand.logoEntreprise != null and brand.logoEntreprise != ''}" 
                     th:src="${siteUrl + brand.logoEntreprise}" 
                     th:alt="${brand.nomApplication}" 
                     class="logo">
                <h1>📧 Mise à jour</h1>
            </div>
            <div class="divider" th:style="'background: ' + ${brand.couleurPrimaire} + ';'"></div>
            <div class="content">
                <p style="font-size: 16px; margin-bottom: 20px;">
                    Bonjour <strong th:text="${prenom} + ' ' + ${nom}"></strong>,
                </p>
                <div class="info-card" th:style="'border-left-color: ' + ${brand.couleurPrimaire}">
                    <p style="font-weight: 600; margin-bottom: 12px;">📊 Évolution de votre candidature :</p>
                    <p style="margin: 8px 0;">• Avant : <span style="color: #64748b;" th:text="${ancienStatut}"></span></p>
                    <p style="margin: 8px 0;">• Maintenant : <strong th:style="'color: ' + ${brand.couleurPrimaire}" th:text="${nouveauStatut}"></strong></p>
                    <p th:if="${commentaire != null and commentaire != ''}" style="margin-top: 12px;">
                        💬 Message : <em th:text="${commentaire}"></em>
                    </p>
                </div>
                <p style="color: #475569; margin: 20px 0 24px;">
                    Nous vous tiendrons informé(e) de toute évolution.
                </p>
                <div style="text-align: center; margin: 28px 0 20px;">
                    <a th:href="${siteUrl} + '/candidat/mes-candidatures/' + ${candidatureId}" class="btn" th:style="'background: ' + ${brand.couleurPrimaire}">
                        📋 Suivre ma candidature
                    </a>
                </div>
            </div>
            <div class="footer">
                <p class="footer-text" th:text="'© ' + ${year} + ' ' + ${brand.nomApplication}"></p>
                <p class="footer-text">Cet email a été envoyé automatiquement, merci de ne pas y répondre.</p>
                <p><a th:href="${siteUrl}" class="footer-link" th:style="'color: ' + ${brand.couleurPrimaire}" th:text="${brand.nomApplication}"></a></p>
            </div>
        </div>
    </div>
</body>
</html>
